<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.8;
            font-size: 14px;
        }

        .chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
        }

        .status-dot.offline {
            background: #dc3545;
        }

        .chat-box {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f6f8;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-wrapper.bot .avatar {
            background: #667eea;
            margin-right: 10px;
        }

        .message-wrapper.user .avatar {
            background: #28a745;
            margin-left: 10px;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-wrapper.bot .bubble {
            background: white;
            color: #333;
            border-top-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .message-wrapper.user .bubble {
            background: #667eea;
            color: white;
            border-top-right-radius: 4px;
        }

        .bubble.loading {
            color: #999;
        }

        .bubble.loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60%,
            100% {
                content: '...';
            }
        }

        .input-area {
            display: flex;
            padding: 16px 20px;
            gap: 10px;
            border-top: 1px solid #e9ecef;
            background: white;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area input:disabled {
            background: #f5f5f5;
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #5a6fd6;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .quick-actions {
            padding: 10px 20px;
            background: white;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 6px 14px;
            background: #f0f2ff;
            color: #667eea;
            border: 1px solid #d4d9ff;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
        }

        .time-tag {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .message-wrapper.bot .time-tag {
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能问答平台</h1>
            <p>Go + Ollama · 本地 AI · 数据不出本机</p>
        </div>
        <div class="chat-container">
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">连接中...</span>
            </div>
            <div class="chat-box" id="chatBox">
                <div class="message-wrapper bot">
                    <div class="avatar">🤖</div>
                    <div class="bubble">你好！我是智能助手。

                        你可以这样问我：
                        • 给我一个3003平台充值500的账号
                        • 查一下余额
                        • 3003平台有哪些号</div>
                </div>
            </div>
            <div class="quick-actions">
                <span style="font-size:12px;color:#999;line-height:28px;">快捷：</span>
                <div class="quick-btn" onclick="quickSend('给我一个3003平台充值500的账号')">获取3003账号</div>
                <div class="quick-btn" onclick="quickSend('3003平台有哪些号')">查看列表</div>
                <div class="quick-btn" onclick="quickSend('帮我在3003平台充值500')">充值</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入你的问题..."
                    onkeypress="if(event.keyCode===13&&!event.shiftKey)sendMessage()" autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isProcessing = false;

        async function checkStatus() {
            try {
                const r = await fetch('/health');
                const d = await r.json();
                document.getElementById('statusDot').classList.toggle('offline', d.status !== 'ok');
                document.getElementById('statusText').textContent =
                    d.status === 'ok' ? `AI 服务正常 · 模型: ${d.model}` : 'AI 服务异常';
            } catch (e) {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = '无法连接';
            }
        }

        function addMessage(content, isUser, timeMs) {
            const w = document.createElement('div');
            w.className = `message-wrapper ${isUser ? 'user' : 'bot'}`;
            const a = document.createElement('div');
            a.className = 'avatar';
            a.textContent = isUser ? '😊' : '🤖';
            const b = document.createElement('div');
            b.className = 'bubble';
            b.textContent = content;
            w.appendChild(a);
            const wrap = document.createElement('div');
            wrap.appendChild(b);
            if (timeMs !== undefined) {
                const t = document.createElement('div');
                t.className = 'time-tag';
                t.textContent = `${(timeMs / 1000).toFixed(1)}s`;
                wrap.appendChild(t);
            }
            w.appendChild(wrap);
            chatBox.appendChild(w);
            chatBox.scrollTop = chatBox.scrollHeight;
            return b;
        }

        function addLoading() {
            const w = document.createElement('div');
            w.className = 'message-wrapper bot'; w.id = 'loadingMsg';
            const a = document.createElement('div');
            a.className = 'avatar'; a.textContent = '🤖';
            const b = document.createElement('div');
            b.className = 'bubble loading'; b.textContent = 'AI 思考中';
            w.appendChild(a); w.appendChild(b);
            chatBox.appendChild(w); chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLoading() { const e = document.getElementById('loadingMsg'); if (e) e.remove(); }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;
            isProcessing = true; sendBtn.disabled = true; userInput.disabled = true;
            addMessage(text, true); userInput.value = ''; addLoading();
            try {
                const r = await fetch('/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const d = await r.json(); removeLoading();
                addMessage(d.reply, false, d.response_time_ms);
            } catch (e) {
                removeLoading(); addMessage('⚠️ 网络错误', false);
            }
            isProcessing = false; sendBtn.disabled = false; userInput.disabled = false; userInput.focus();
        }

        function quickSend(t) { userInput.value = t; sendMessage(); }
        checkStatus(); setInterval(checkStatus, 30000); userInput.focus();
    </script>
</body>

</html>
